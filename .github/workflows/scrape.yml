name: Scrape infocom.am articles

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of articles to scrape'
        required: false
        default: '1000'
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '8'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: |
          python web_scraper.py \
            --limit ${{ github.event.inputs.limit }} \
            --workers ${{ github.event.inputs.workers }} \
            --output articles.jsonl \
            --resume

      - name: Show stats
        run: |
          echo "Articles scraped:"
          wc -l articles.jsonl
          echo "File size:"
          du -h articles.jsonl

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.jsonl
          git diff --cached --quiet || git commit -m "Scrape $(wc -l < articles.jsonl) articles from infocom.am"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: articles
          path: articles.jsonl
          retention-days: 30
